caseId: TC_LOGIN_001
caseName: 用户登录成功
description: 验证用户输入正确账号密码后可以成功登录系统并跳转首页
tags:
  - login
  - smoke
  - web
priority: P0
mode: hybrid
config:
  retryCount: 1
  timeout: 30000
  screenshotOnFail: true
  stopOnFailure: true
variables:
  username: "${LOGIN_USERNAME}"
  password: "${LOGIN_PASSWORD}"

beforeActions: []

mainSteps:
  - use: common/web_login
    with:
      session: user
      username: "${username}"
      password: "${password}"
      site: user
      url: "#/login?redirect=%2Fdashboard"

assertions:
  - id: assert_01
    type: web_assert_url
    name: 校验跳转首页
    params:
      site: user
      expected: "#/dashboard"
      timeout: 30000

  - id: assert_02
    type: web_assert_text
    name: 校验欢迎语存在
    params:
      target: "欢迎区域"
      expected: "欢迎进入Dowalet"
      timeout: 30000

  - id: assert_03
    type: web_screenshot
    name: 保存登录成功截图
    params:
      fileName: "login_success.png"

afterActions: []
